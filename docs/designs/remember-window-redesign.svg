      <text x="44" y="166" class="detailText">AI 产品的窗口不只是更大，</text>
      <text x="44" y="200" class="detailText">也会更频繁地需要用户在</text>
      <text x="44" y="234" class="detailText">上下文之间来回取回内容。</text>
      <text x="44" y="286" class="detailText">这里保持只读，避免误编辑；</text>
      <text x="44" y="320" class="detailText">真正的操作都藏在左侧条目里。</text>
      <rect x="24" y="456" width="260" height="42" rx="8" fill="#F4F8F5"/>
      <text x="42" y="482" font-size="14" font-weight="650" fill="#5F7168">已经放回剪贴板</text>
