      <rect x="646" y="150" width="5" height="94" rx="2.5" fill="#9FCDB2"/>
      <rect x="646" y="466" width="5" height="54" rx="2.5" fill="#DFEAE3"/>
    </g>

    <g transform="translate(742 164)" filter="url(#softShadow)">
      <rect x="0" y="0" width="308" height="530" rx="10" fill="#FFFFFF" stroke="#D9E5DC"/>
