<svg width="1100" height="760" viewBox="0 0 1100 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="windowShadow" x="-30" y="-24" width="1160" height="820" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#17251F" flood-opacity="0.16"/>
    </filter>
    <filter id="softShadow" x="-20" y="-20" width="760" height="680" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1B3126" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1100" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAF6"/>
      <stop offset="0.52" stop-color="#EEF6F0"/>
      <stop offset="1" stop-color="#F8F4EF"/>
    </linearGradient>
    <linearGradient id="selectedRow" x1="0" y1="0" x2="612" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E6F5EB"/>
      <stop offset="1" stop-color="#F1FAF4"/>
    </linearGradient>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 760; fill: #18241E; letter-spacing: 0; }
      .subtitle { font-size: 15px; font-weight: 500; fill: #607068; letter-spacing: 0; }
      .sectionTitle { font-size: 22px; font-weight: 760; fill: #1F2E26; letter-spacing: 0; }
      .sectionMeta { font-size: 13px; font-weight: 600; fill: #7A8A82; letter-spacing: 0; }
      .rowText { font-size: 16px; font-weight: 680; fill: #26372E; letter-spacing: 0; }
      .rowSubtle { font-size: 13px; font-weight: 600; fill: #74847D; letter-spacing: 0; }
      .detailTitle { font-size: 22px; font-weight: 760; fill: #1F2E26; letter-spacing: 0; }
      .detailText { font-size: 17px; font-weight: 520; fill: #33443A; letter-spacing: 0; }
      .buttonText { font-size: 13px; font-weight: 760; fill: #226A45; letter-spacing: 0; }
      .dangerText { font-size: 13px; font-weight: 760; fill: #B83B3B; letter-spacing: 0; }
      .chipText { font-size: 12px; font-weight: 760; fill: #28724B; letter-spacing: 0; }
