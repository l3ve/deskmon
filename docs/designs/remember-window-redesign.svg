        <text x="16" y="48" class="rowSubtle">点一下只查看，操作在右侧浮出</text>
        <rect x="384" y="14" width="58" height="36" rx="18" fill="#FFFFFF" stroke="#BCE5CB"/>
        <text x="399" y="37" class="buttonText">回忆</text>
        <rect x="450" y="14" width="76" height="36" rx="18" fill="#FFFFFF" stroke="#BCE5CB"/>
        <text x="468" y="37" class="buttonText">记住它</text>
        <rect x="534" y="14" width="66" height="36" rx="18" fill="#FFF6F4" stroke="#F0C7C3"/>
