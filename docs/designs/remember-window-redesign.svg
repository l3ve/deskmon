      </g>
      <g transform="translate(22 224)">
        <rect x="0" y="0" width="626" height="56" rx="8" fill="#FFFFFF"/>
        <text x="16" y="34" class="rowText">对 Anthropic 高级模型 Fab...</text>
      </g>
      <g transform="translate(22 288)">
        <rect x="0" y="0" width="626" height="56" rx="8" fill="#FFFFFF"/>
        <text x="16" y="34" class="rowText">仅需要技术领先</text>
      </g>
      <g transform="translate(22 352)">
        <rect x="0" y="0" width="626" height="56" rx="8" fill="#FFFFFF"/>
        <text x="16" y="34" class="rowText">l3ve624@gmail.com</text>
      </g>

      <line x1="0" y1="408" x2="670" y2="408" stroke="#E7EEE9"/>
      <text x="26" y="450" class="sectionTitle">笔记本</text>
      <text x="110" y="450" class="sectionMeta">牢牢记下的 5 条</text>
      <g transform="translate(22 466)">
        <rect x="0" y="0" width="626" height="50" rx="8" fill="#F3F8F4"/>
        <text x="16" y="31" class="rowText">l3ve624@gmail.com</text>
        <rect x="526" y="12" width="58" height="26" rx="13" fill="#DBF3E6"/>
        <text x="543" y="30" class="chipText">置顶</text>
