    <g transform="translate(742 164)" class="ui">
      <rect x="0.5" y="0.5" width="307" height="68" rx="9.5" fill="#FBFDFB"/>
      <text x="24" y="42" class="detailTitle">记忆中</text>
      <rect x="214" y="20" width="70" height="28" rx="14" fill="#E6F5EB"/>
      <text x="233" y="39" class="chipText">临时</text>
      <line x1="0" y1="68" x2="308" y2="68" stroke="#E7EEE9"/>
      <rect x="24" y="92" width="260" height="338" rx="8" fill="#FCFEFC" stroke="#DCE8DF"/>
